<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韩晓磊 | HAN XIAO LEI PORTFOLIO 2026</title>
    <style>
        :root { --main-pink: #FF3399; --bg-black: #000000; --text-gray: #CCCCCC; }
        body { background-color: var(--bg-black); color: white; font-family: "Microsoft YaHei", sans-serif; margin: 0; }
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 8px solid var(--main-pink); background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('cover_bg.jpg') center/cover; }
        .hero h1 { font-size: 80px; color: var(--main-pink); margin: 0; font-weight: 900; letter-spacing: 5px; }
        .about { display: flex; padding: 80px 10%; gap: 50px; align-items: flex-start; flex-wrap: wrap; }
        .about-img { width: 350px; height: 450px; border: 2px solid var(--main-pink); background: #1a1a1a; display: flex; align-items: center; justify-content: center; color: #444; overflow: hidden; }
        .about-img img { width: 100%; height: 100%; object-fit: cover; }
        .about-text { flex: 1; min-width: 300px; }
        .about-text h2 { color: var(--main-pink); font-size: 36px; border-bottom: 2px solid var(--main-pink); display: inline-block; margin-bottom: 30px; }
        .tag-container { margin-top: 25px; display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { border: 1px solid var(--main-pink); color: var(--main-pink); padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        .intro-text { line-height: 1.8; color: var(--text-gray); font-size: 16px; }
        strong { color: white; }
    </style>
</head>

</body>
</html>
